# ============================================================
# FMS Mining — nginx pour déploiement LAN local
# Fichier : /etc/nginx/sites-available/fms-mining
# ============================================================
#
# Adapter SERVER_IP à l'IP réelle du PC serveur sur le LAN
# Adapter les chemins /opt/mining/ si nécessaire
#
# Pour générer un certificat auto-signé :
#   mkdir -p /etc/ssl/fms
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/ssl/fms/server.key \
#     -out    /etc/ssl/fms/server.crt \
#     -subj "/CN=fms-mine-local/O=Mine/C=FR"
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Serveur principal HTTPS
server {
    listen 443 ssl;
    server_name _;

    # Certificat auto-signé (LAN interne)
    ssl_certificate     /etc/ssl/fms/server.crt;
    ssl_certificate_key /etc/ssl/fms/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend React (build statique)
    root /opt/mining/frontend/dist;
    index index.html;

    # Toutes les routes React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Assets avec cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API REST → Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket Socket.io → Node.js backend
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;  # connexion WS longue durée
    }

    # Health check (pas de log pour ce endpoint)
    location /health {
        proxy_pass http://127.0.0.1:4000;
        access_log off;
    }
}
